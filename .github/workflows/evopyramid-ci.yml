name: EvoPyramid CI

on:
  push:
    branches:
      - main
      - master
      - codex/**
  pull_request:
  workflow_dispatch:

jobs:
  frontend:
    name: Frontend Build (evopyramid-v2)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: evopyramid-v2
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: evopyramid-v2/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run lint

      - name: Build
        run: npm run build

  python-sanity:
    name: Python Compile Sanity
    runs-on: ubuntu-latest
    env:
      PYTHONIOENCODING: utf-8
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Compile project layers
        run: |
          python -m compileall \
            "α_Pyramid_Core" \
            "β_Pyramid_Functional" \
            "γ_Pyramid_Reflective"

