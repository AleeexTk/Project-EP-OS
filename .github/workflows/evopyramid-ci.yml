name: EvoPyramid CI

on:
  push:
    branches: [main, master, "codex/**", "antigravity/**"]
  pull_request:
  workflow_dispatch:

jobs:

  # ── 1. Fast compile gate ───────────────────────────────────────
  python-sanity:
    name: Python Compile Check
    runs-on: ubuntu-latest
    env:
      PYTHONIOENCODING: utf-8
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'
      - name: Compile all layers
        run: |
          python -m compileall \
            alpha_pyramid_core \
            beta_pyramid_functional \
            gamma_pyramid_reflective

  # ── 1.5 Architecture Deduplication Gate ──────────────────────
  architecture-check:
    name: Architectural Deduplication Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'
      - name: Run Deduplication Check
        run: python scripts/ci_architectural_check.py

  # ── 2. Pytest gate — blocks merge if red ──────────────────────
  pytest:
    name: Pytest Gate
    runs-on: ubuntu-latest
    needs: python-sanity
    env:
      PYTHONIOENCODING: utf-8
      PYTHONPATH: ${{ github.workspace }}
      # Dummy keys — tests must not make real LLM calls
      ANTHROPIC_API_KEY: test-key-ci
      OPENAI_API_KEY: test-key-ci
      GEMINI_API_KEY: test-key-ci
      OLLAMA_API_KEY: test-key-ci
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'
      - name: Install dependencies
        run: pip install uv --quiet && uv sync 2>/dev/null || pip install -r requirements.txt --quiet
      - name: Install pytest
        run: pip install pytest pytest-asyncio --quiet
      - name: Run tests
        run: |
          python -m pytest tests/ \
            --ignore=tests/e2e_api_test.py \
            -x --tb=short -q \
            --asyncio-mode=auto
        # --ignore e2e: requires live server
        # -x: stop on first failure → Codex sees exactly what broke
      - name: Upload failure log
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: pytest-failure-log
          path: .pytest_cache/
          retention-days: 7

  # ── 3. Frontend build ──────────────────────────────────────────
  frontend:
    name: Frontend Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: evopyramid-v2
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: evopyramid-v2/package-lock.json
      - run: npm ci --quiet
      - run: npm run lint
      - run: npm run build

  # ── 4. Codex auto-review on every PR ──────────────────────────
  codex-review:
    name: Codex Code Review
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: refs/pull/${{ github.event.pull_request.number }}/merge
      - name: Pre-fetch refs
        run: |
          git fetch --no-tags origin \
            ${{ github.event.pull_request.base.ref }} \
            +refs/pull/${{ github.event.pull_request.number }}/head
      - name: Run Codex review
        id: run_codex
        uses: openai/codex-action@v1
        with:
          openai-api-key: ${{ secrets.OPENAI_API_KEY }}
          prompt-file: .github/codex/prompts/review.md
          output-file: codex-review-output.md
          safety-strategy: drop-sudo
          sandbox: workspace-write
      - name: Post review comment
        if: steps.run_codex.outputs.final-message != ''
        uses: actions/github-script@v7
        with:
          github-token: ${{ github.token }}
          script: |
            const fs = require('fs');
            const body = fs.existsSync('codex-review-output.md')
              ? fs.readFileSync('codex-review-output.md', 'utf8')
              : '${{ steps.run_codex.outputs.final-message }}';
            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `### 🤖 Codex Review\n\n${body}`
            });
